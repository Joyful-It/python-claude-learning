<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>minimax</title>
        <style>
            h1{
                color: blue;
                font-size: 100px;
            }
        </style>
        <script src="../js/4211.js">   </script>
        <link rel="stylesheet" href="../css/demo1.css">
    </head>
    <body>
        <div>
        <h1>minimax is the best model</h1>            <!--# 标题1-->
        <h2 style="color: pink;"> GLM-5 is the best model</h2>
        <h3> doubao is the best model</h3>
        
        
        <ol>                                           <!--# 有序列表-->
            <li>GLM-5 is the best model</li>
            <li>doubao is the best model</li>
        </ol>
        <ul>                                           <!--# 无序列表-->
            <li>GLM-5 is the best model</li>
            <li>doubao is the best model</li>
        </ul>
        <a href="https://www.baidu.com">baidu</a>            <!--# a标签 链接-->
        <a href="https://www.taobao.com">taobao</a>           <!--# a标签 链接-->
        <br/>
        <img src="https://www.baidu.com/img/PCtm_d9c8750bed0b3c7d089fa7d55720d6cf.png" alt="baidu" width="200" height="200">            # img标签 图片标签
         # 图片标签的属性:src 图片路径,alt 图片替代文本,width 图片宽度 height 图片高度
        </div>
        <div>
            <form>
                <div>
                    <label for="username" >用户名：</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名">
                    <label>username</label>
                    <input type="text" name="username" placeholder="please enter">
                </div>
                <div>
                    <label style="color: blue;">sex1</label>
                    <input type="radio" name="sex">man
                    <input type="radio" name="sex">girl
                </div>
                <div>
                    <label style="height: auto ;color:red;">hobby</label>
                    <input type="checkbox" name="hobby">fishing
                    <input type="checkbox" name="hobby">laptop
                </div>
                <div>
                    <select>
                        <option>
                            beijng
                        </option>
                        <option> shanghai</option>
                    </select>
                </div>
            </form>
        </div>
    </body>
</html>
